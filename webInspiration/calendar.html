<!doctype html>

<html class="light" lang="en">

    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#ec5b13',
              'background-light': '#f8f6f6',
              'background-dark': '#221610',
              'vibrant-blue': '#007AFF',
            },
            fontFamily: {
              display: ['Public Sans'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
    <style>
      .glass-effect {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .dark .glass-effect {
        background: rgba(34, 22, 16, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen"

    <div class="relative flex min-h-screen flex-col overflow-x-hidden">
      <!-- Top Navigation Bar -->

            <h1

              Schedule a Session

            <p class="text-slate-500 dark:text-slate-400">

              consultation.
            </p>
          </div>
          <!-- Main Layout -->

            <!-- Calendar Interface (Glassmorphism) -->

                <h3
                  class="text-xl font-bold text-slate-900 dark:text-slate-100"
                >

                    class="p-2 rounded-full hover:bg-white/40 dark:hover:bg-black/20 text-slate-600 dark:text-slate-300"

                    <span class="material-symbols-outlined">chevron_left</span>
                  </button>
                  <button
                    class="p-2 rounded-full hover:bg-white/40 dark:hover:bg-black/20 text-slate-600 dark:text-slate-300"
                  >
                    <span class="material-symbols-outlined">chevron_right</span>
                  </button>
                </div>
              </div>
              <!-- Days of week -->

                <div
                  class="text-center text-xs font-semibold text-slate-400 uppercase tracking-widest py-2"

                  Sun
                </div>
                <div
                  class="text-center text-xs font-semibold text-slate-400 uppercase tracking-widest py-2"
                >
                  Mon
                </div>
                <div
                  class="text-center text-xs font-semibold text-slate-400 uppercase tracking-widest py-2"

                  Tue
                </div>
                <div
                  class="text-center text-xs font-semibold text-slate-400 uppercase tracking-widest py-2"

                  Wed
                </div>
                <div
                  class="text-center text-xs font-semibold text-slate-400 uppercase tracking-widest py-2"

                  Thu
                </div>
                <div
                  class="text-center text-xs font-semibold text-slate-400 uppercase tracking-widest py-2"
                >
                  Fri
                </div>
                <div
                  class="text-center text-xs font-semibold text-slate-400 uppercase tracking-widest py-2"
                >
                  Sat
                </div>
              </div>
              <!-- Date Grid -->
              <div class="grid grid-cols-7 gap-1">
                <!-- Empty cells -->
                <div class="aspect-square"></div>
                <div class="aspect-square"></div>
                <div class="aspect-square"></div>
                <div
                  class="aspect-square flex items-center justify-center text-slate-400"
                >
                  1
                </div>
                <div
                  class="aspect-square flex items-center justify-center text-slate-400"
                >
                  2
                </div>
                <div
                  class="aspect-square flex items-center justify-center text-slate-400"
                >
                  3
                </div>
                <div
                  class="aspect-square flex items-center justify-center text-slate-400"
                >
                  4
                </div>
                <button
                  class="aspect-square flex flex-col items-center justify-center rounded-2xl bg-vibrant-blue text-white shadow-lg shadow-vibrant-blue/20"
                >
                  <span class="text-lg font-bold">5</span>
                  <div class="w-1 h-1 rounded-full bg-white mt-1"></div>
                </button>
                <button
                  class="aspect-square flex items-center justify-center rounded-2xl hover:bg-white/40 dark:hover:bg-black/20 text-slate-700 dark:text-slate-200"

                  6
                </button>
                <button

                <button

                <button

                <button

                <button

                <button

                <button

                </button>
                <button

                <button

                >
                  29
                </button>
                <button
                  class="aspect-square flex items-center justify-center rounded-2xl hover:bg-white/40 dark:hover:bg-black/20 text-slate-700 dark:text-slate-200"
                >
                  30
                </button>
                <button
                  class="aspect-square flex items-center justify-center rounded-2xl hover:bg-white/40 dark:hover:bg-black/20 text-slate-700 dark:text-slate-200"
                >
                  31
                </button>
              </div>
            </div>
            <!-- Time Slots Sidebar -->
            <div class="flex flex-col gap-6">
              <div
                class="glass-effect rounded-3xl p-6 shadow-xl flex flex-col gap-4"
              >
                <h4
                  class="text-sm font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400"
                >
                  Slots for Oct 5
                </h4>
                <div class="flex flex-col gap-3">
                  <!-- Available Time Slot -->
                  <button
                    class="group flex items-center justify-between p-4 rounded-2xl bg-white/60 dark:bg-black/30 border border-white/50 dark:border-white/10 hover:border-vibrant-blue transition-all"
                  >
                    <div class="flex flex-col items-start">
                      <span
                        class="text-slate-900 dark:text-slate-100 font-semibold"
                        >09:00 AM</span
                      >
                      <span class="text-xs text-slate-500">45 minutes</span>
                    </div>
                    <span
                      class="material-symbols-outlined text-vibrant-blue opacity-0 group-hover:opacity-100 transition-opacity"
                      >add_circle</span
                    >
                  </button>
                  <button
                    class="group flex items-center justify-between p-4 rounded-2xl bg-white/60 dark:bg-black/30 border border-white/50 dark:border-white/10 hover:border-vibrant-blue transition-all"
                  >
                    <div class="flex flex-col items-start">
                      <span
                        class="text-slate-900 dark:text-slate-100 font-semibold"
                        >10:30 AM</span
                      >
                      <span class="text-xs text-slate-500">45 minutes</span>
                    </div>
                    <span
                      class="material-symbols-outlined text-vibrant-blue opacity-0 group-hover:opacity-100 transition-opacity"
                      >add_circle</span
                    >
                  </button>
                  <button
                    class="group flex items-center justify-between p-4 rounded-2xl border-2 border-vibrant-blue bg-vibrant-blue/10"
                  >
                    <div class="flex flex-col items-start">
                      <span class="text-vibrant-blue font-bold">01:00 PM</span>
                      <span class="text-xs text-vibrant-blue/70">Selected</span>
                    </div>
                    <span class="material-symbols-outlined text-vibrant-blue"
                      >check_circle</span
                    >
                  </button>
                  <button
                    class="group flex items-center justify-between p-4 rounded-2xl bg-white/60 dark:bg-black/30 border border-white/50 dark:border-white/10 hover:border-vibrant-blue transition-all"
                  >
                    <div class="flex flex-col items-start">
                      <span
                        class="text-slate-900 dark:text-slate-100 font-semibold"
                        >02:30 PM</span
                      >
                      <span class="text-xs text-slate-500">45 minutes</span>
                    </div>
                    <span
                      class="material-symbols-outlined text-vibrant-blue opacity-0 group-hover:opacity-100 transition-opacity"
                      >add_circle</span

                  <button
                    class="group flex items-center justify-between p-4 rounded-2xl bg-white/60 dark:bg-black/30 border border-white/50 dark:border-white/10 hover:border-vibrant-blue transition-all"
                  >
                    <div class="flex flex-col items-start">
                      <span
                        class="text-slate-900 dark:text-slate-100 font-semibold"
                        >04:00 PM</span

                      <span class="text-xs text-slate-500">45 minutes</span>
                    </div>
                    <span
                      class="material-symbols-outlined text-vibrant-blue opacity-0 group-hover:opacity-100 transition-opacity"
                      >add_circle</span
                    >
                  </button>
                </div>
                <button
                  class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-2xl mt-4 shadow-lg shadow-primary/25 transition-all"
                >
                  Confirm Booking
                </button>
              </div>
              <!-- Advisor Profile Quick Info -->
              <div
                class="glass-effect rounded-3xl p-6 shadow-xl flex items-center gap-4"
              >
                <div
                  class="h-12 w-12 rounded-full bg-cover bg-center border-2 border-white"
                  data-alt="Advisor Sarah Mitchell profile picture"
                  style="
                    background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBfdGuJzGbQCJDNygmZDy66lTD1k8dsAJC-y1EKHskRKL1hHPkVI-nCr62e1J_ix9u4HNjz8X0rX68oIMQnExazzqJHqwMJ7aI93EGOnf5_PY30S4K7uS-2NL5dgGyTEQh9LWE2M1yGXX2O1tmccgvgI0Qg0Ki7IVfj1Ni9jisHmAyGOGjniWB2Aeo8qVAeyOJe81Du68uKasOW_1mM6HlHhRiRUWOpqHn6P6kgkVDGiDYwzL0zNbFWkPR2TzmF-crd3cBHsHVRwTg');
                  "
                ></div>
                <div class="flex flex-col">
                  <span class="font-bold text-slate-900 dark:text-slate-100"
                    >Sarah Mitchell</span
                  >
                  <span
                    class="text-xs text-slate-500 uppercase font-bold tracking-tight"
                    >Academic Advisor</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
